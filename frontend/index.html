<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UniHelp | Login</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body class="login-body">
    <div class="login-split">
        <div class="login-image-side">
            <div class="image-overlay">
                <div class="overlay-content">
                    <h2>Empowering Excellence</h2>
                    <p>Join a diverse community of innovators and leaders. Access your academic resources seamlessly.</p>
                </div>
            </div>
        </div>

        <div class="login-form-side">
            <div class="login-container">
                <h1 class="logo-text">UniHelp</h1>
                <p class="subtitle">Your Academic Helpdesk</p>
                
                <div class="login-options">
                    <button onclick="login('student')" class="btn student-btn">
                        Login as Student
                    </button>
                    <button onclick="login('admin')" class="btn secondary admin-btn">
                        Login as Administrator
                    </button>
                </div>
                <p class="security-text">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align: middle; margin-right: 5px;">
                        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
                    </svg>
                    Protected by UniHelp Hybrid RAG Security
                </p>
            </div>
        </div>
    </div>
    <script src="auth.js"></script>
</body>
</html>
